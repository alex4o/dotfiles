# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

bind r source-file ~/.tmux.conf

# Vi-style pane navigation without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

set -sg escape-time 0
set -g mouse on

set -g status-left '#[fg=colour245,bold]#(echo $USER)@#h'
set -g status-right "#[fg=colour245,bold] #(sensors | grep id | awk '{print $4}') %d/%m %H:%M:%S "
set -g status-right-length 80
set -g status-left-length 30
#
#
## Appearance
#

# Status bar
set -g status-position bottom
set -g status-interval 4
#set -g status-left ''
#set -g status-right ''
set -g status-justify centre # center align window list

setw -g status-style default
setw -g window-status-current-style default
setw -g window-status-style default

setw -g window-status-format '#[bg=black]#[fg=cyan,bold] #I #[bg=default]#[fg=cyan] #W '
setw -g window-status-current-format '#[fg=black]#[bg=cyan] #I #[fg=cyan]#[bg=default] #W '

# Panel borders
set -g pane-active-border-style fg=cyan
set -g pane-border-style fg=black

# Message text
set-option -g message-style bg=default
set-option -g history-limit 100000
set -g focus-events on


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.tmux/plugins/tpm/tpm'
set -g extended-keys on
set -g extended-keys-format csi-u
